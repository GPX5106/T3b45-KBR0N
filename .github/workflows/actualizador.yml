name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  URL_EXCEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSl7QoufNmMoMeG-SyeB5KaqDupbAYtg_675LcwbYSQGT2JKUdXo2F_aqFRkDzBurNUH39DFSRfeG7b/pub?gid=2124629301&single=true&output=csv"
  URL_NEWERA: "https://ipfs.io/ipns/k2k4r8lm8tkmuxbc8lkmq1in3v0oya1p6pe9o5bu0hu30br5ko08k2gb/data/listas/lista_iptv.m3u"
  URL_NEWERA_ACE: "https://k2k4r8lm8tkmuxbc8lkmq1in3v0oya1p6pe9o5bu0hu30br5ko08k2gb.ipns.dweb.link/data/listas/lista_fuera_iptv.m3u"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Procesar Listas
        run: |
          # 1. Descargar las listas maestras y el CSV
          curl -L --retry 3 "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u || curl -L "https://cloudflare-ipfs.com/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          curl -L --retry 3 "$URL_NEWERA" -o newera_base.m3u
          curl -L --retry 3 "$URL_NEWERA_ACE" -o newera_ace_base.m3u
          curl -L --retry 3 "$URL_EXCEL" -o usuarios.csv

          mkdir -p temp_listas
          AHORA=$(date +%s)

          # 2. LIMPIEZA DE ARCHIVOS MARCADOS PARA BORRAR (Si ya pasó la semana)
          for f in *.vence; do
            if [ -f "$f" ]; then
              FECHA_BORRADO=$(cat "$f")
              if [ "$AHORA" -ge "$FECHA_BORRADO" ]; then
                BASENAME=$(basename "$f" .vence)
                echo "🗑️ Plazo de 7 días cumplido. Borrando permanentemente: $BASENAME"
                rm -f "${BASENAME}(local).m3u" "${BASENAME}(servidor).m3u" "${BASENAME}(newera).m3u" "${BASENAME}(newera_ace).m3u" "$f"
              fi
            fi
          done

          # 3. GENERACIÓN POR FECHA DE VENCIMIENTO
          tail -n +2 usuarios.csv | while IFS=',' read -r basura nombre vencimiento || [ -n "$nombre" ]; do
            
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            [ -z "$USER" ] && continue

            FECHA_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            FECHA_LIMITE_SEC=$(date -d "$FECHA_ISO" +%s 2>/dev/null || echo 0)
            FECHA_LIMITE_FIN_DIA=$((FECHA_LIMITE_SEC + 86399))

            FILE_LOCAL="${USER}(local).m3u"
            FILE_SERVI="${USER}(servidor).m3u"
            FILE_NEWER="${USER}(newera).m3u"
            FILE_ACE="${USER}(newera_ace).m3u"

            if [ "$FECHA_LIMITE_FIN_DIA" -ge "$AHORA" ]; then
              # === USUARIO ACTIVO ===
              rm -f "${USER}.vence"
              ES_NUEVO=$([ ! -f "$FILE_LOCAL" ] && echo "true" || echo "false")

              # Crear archivos m3u
              echo "# LISTA LOCAL PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_LOCAL" && cat maestra.m3u >> "temp_listas/$FILE_LOCAL"
              echo "# LISTA SERVIDOR PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_SERVI" && sed 's|127.0.0.1|100.94.254.40|g' maestra.m3u >> "temp_listas/$FILE_SERVI"
              echo "# LISTA NEW ERA PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_NEWER" && cat newera_base.m3u >> "temp_listas/$FILE_NEWER"
              echo "# LISTA NEW ERA ACESTREAM PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_ACE" && cat newera_ace_base.m3u >> "temp_listas/$FILE_ACE"

              if [ "$ES_NUEVO" = true ]; then
                encode() { echo "$1" | sed 's/(/%28/g; s/)/%29/g'; }
                URL_L="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/$(encode "$FILE_LOCAL")"
                URL_S="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/$(encode "$FILE_SERVI")"
                URL_N="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/$(encode "$FILE_NEWER")"
                URL_A="https://cdn.jsdelivr.net/gh/${{ github.repository }}@main/$(encode "$FILE_ACE")"
                
                MSG="🚀 <b>¡Nueva alta: ${USER}!</b>%0A📅 <b>Vence:</b> ${FECHA_FIN}%0A%0A🏠 <b>LOCAL:</b> <code>${URL_L}</code>%0A☁️ <b>SERVI:</b> <code>${URL_S}</code>%0A✨ <b>NEWERA:</b> <code>${URL_N}</code>%0A⚙️ <b>ACE:</b> <code>${URL_A}</code>"
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" -d "text=${MSG}" -d "parse_mode=HTML"
              fi
            else
              # === USUARIO CADUCADO ===
              if [ -f "$FILE_LOCAL" ] && [ ! -f "${USER}.vence" ]; then
                AVISO="#EXTM3U\n#EXTINF:-1, LISTA CADUCADA - CONTACTA CON SOPORTE\nhttp://0.0.0.0"
                echo -e "$AVISO" > "temp_listas/$FILE_LOCAL"
                echo -e "$AVISO" > "temp_listas/$FILE_SERVI"
                echo -e "$AVISO" > "temp_listas/$FILE_NEWER"
                echo -e "$AVISO" > "temp_listas/$FILE_ACE"
                echo $((AHORA + 604800)) > "temp_listas/${USER}.vence"
                curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@main/${FILE_LOCAL}" > /dev/null
              fi
            fi
          done

          # 5. LIMPIEZA Y SUSTITUCIÓN
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" ! -name "newera_base.m3u" ! -name "newera_ace_base.m3u" -delete
          mv temp_listas/*.m3u . 2>/dev/null || true
          mv temp_listas/*.vence . 2>/dev/null || true
          rm -rf temp_listas usuarios.csv newera_base.m3u newera_ace_base.m3u

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sincronización (4 Listas + Borrado 7 días): $(date +'%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main
            git push origin main
          fi
