- name: Procesar Listas
        run: |
          # 1. Descargar la lista maestra original (Multi-Gateway)
          echo "Descargando lista maestra..."
          curl -L --retry 2 "https://cloudflare-ipfs.com/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra_base.m3u || \
          curl -L --retry 2 "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra_base.m3u || \
          curl -L --retry 2 "https://dweb.link/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra_base.m3u

          # Descargar la externa
          echo "Descargando lista externa..."
          curl -L --retry 3 "$URL_EXTERNA" -o lista_externa.m3u || echo "Error descargando externa"

          # Descargar el CSV
          echo "Descargando CSV de usuarios..."
          curl -L --retry 3 "$URL_EXCEL" -o usuarios.csv

          # 2. Extraer el grupo MOTOR y sus canales
          echo "Extrayendo sección MOTOR..."
          echo -e "\n# --- SECCIÓN MOTOR ---" > motor.m3u
          
          # Buscamos la línea del grupo y todas las líneas INF y URL que le siguen hasta el siguiente grupo
          awk '/group-title="MOTOR"/{print; flag=1; next} /group-title="/{flag=0} flag' lista_externa.m3u >> motor.m3u
          
          # Limpiar líneas vacías
          sed -i '/^$/d' motor.m3u

          # 3. Fusionar maestra base con motor
          cat maestra_base.m3u motor.m3u > maestra.m3u

          # 4. Crear carpeta temporal
          mkdir -p temp_listas

          # 5. GENERACIÓN POR FECHA DE VENCIMIENTO
          AHORA=$(date +%s)

          tail -n +2 usuarios.csv | while IFS=',' read -r basura nombre vencimiento || [ -n "$nombre" ]; do
            
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            [ -z "$USER" ] && continue

            FECHA_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            FECHA_LIMITE_SEC=$(date -d "$FECHA_ISO" +%s 2>/dev/null || echo 0)
            FECHA_LIMITE_FIN_DIA=$((FECHA_LIMITE_SEC + 86399))

            if [ "$FECHA_LIMITE_FIN_DIA" -ge "$AHORA" ]; then
              FILE_LOCAL="${USER}(local).m3u"
              FILE_SERVI="${USER}(servidor).m3u"
              
              if [ ! -f "$FILE_LOCAL" ]; then
                ES_NUEVO=true
              else
                ES_NUEVO=false
              fi

              # Generar Local
              echo "# LISTA LOCAL PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_LOCAL"
              cat maestra.m3u >> "temp_listas/$FILE_LOCAL"

              # Generar Servidor
              echo "# LISTA SERVIDOR PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_SERVI"
              sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u >> "temp_listas/$FILE_SERVI"

              # 6. NOTIFICACIÓN TELEGRAM
              if [ "$ES_NUEVO" = true ]; then
                echo "🚀 Notificando nueva alta: $USER"
                URL_L="https://raw.githubusercontent.com/${{ github.repository }}/main/$(echo $FILE_LOCAL | sed 's/(/%28/g; s/)/%29/g')"
                URL_S="https://raw.githubusercontent.com/${{ github.repository }}/main/$(echo $FILE_SERVI | sed 's/(/%28/g; s/)/%29/g')"
                
                MESSAGE="🚀 <b>¡Nueva alta: ${USER}!</b>%0A%0A📅 <b>Vence:</b> ${FECHA_FIN}%0A%0A🏠 <b>Enlace LOCAL:</b>%0A<code>${URL_L}</code>%0A%0A☁️ <b>Enlace SERVIDOR:</b>%0A<code>${URL_S}</code>"
                
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                  -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                  -d "text=${MESSAGE}" \
                  -d "parse_mode=HTML"
              fi
            fi
          done

          # 7. LIMPIEZA
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" -delete
          mv temp_listas/*.m3u . 2>/dev/null || true
          rm -rf temp_listas usuarios.csv maestra_base.m3u lista_externa.m3u motor.m3u
