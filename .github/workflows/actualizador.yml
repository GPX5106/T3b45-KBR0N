name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  URL_EXCEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSl7QoufNmMoMeG-SyeB5KaqDupbAYtg_675LcwbYSQGT2JKUdXo2F_aqFRkDzBurNUH39DFSRfeG7b/pub?gid=0&single=true&output=csv"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Procesar Listas
        run: |
          # 1. Descargar la lista maestra original
          curl -L "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          
          # 2. Crear la versión base para el servidor (tu IP de Tailscale)
          sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u | tr -d '\r' > lista_servidor.m3u

          # 3. Descargar base de datos de usuarios desde Google Sheets
          curl -L "$URL_EXCEL" -o usuarios.csv

          # 4. LIMPIEZA: Borramos todos los archivos de usuarios anteriores
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" ! -name "lista_servidor.m3u" -delete

          # 5. GENERACIÓN POR FECHA DE VENCIMIENTO
          # Fecha actual en segundos
          AHORA=$(date +%s)

          # Leemos Nombre (Col A) y Fecha Vencimiento (Col B)
          # Formato esperado en Excel: DD/MM/AAAA
          tail -n +2 usuarios.csv | while IFS=',' read -r nombre vencimiento || [ -n "$nombre" ]; do
            
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            [ -z "$USER" ] && continue

            # Convertimos DD/MM/AAAA a formato entendible por 'date' (AAAA-MM-DD)
            FECHA_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            
            # Convertimos la fecha de vencimiento a segundos
            # Sumamos 86399 segundos para que el acceso dure hasta el final del día marcado
            FECHA_LIMITE_SEC=$(date -d "$FECHA_ISO" +%s 2>/dev/null || echo 0)
            FECHA_LIMITE_FIN_DIA=$((FECHA_LIMITE_SEC + 86399))

            if [ "$FECHA_LIMITE_FIN_DIA" -ge "$AHORA" ]; then
              echo "✅ $USER activo hasta el $FECHA_FIN"
              echo "# Lista para $USER - EXPIRA: $FECHA_FIN - Actualizada: $(date +'%d/%m/%Y %H:%M')" > "${USER}.m3u"
              cat lista_servidor.m3u >> "${USER}.m3u"
            else
              echo "⚠️ $USER ha caducado el $FECHA_FIN. Eliminando acceso."
            fi
          done

          # Limpieza de archivos temporales
          rm lista_servidor.m3u usuarios.csv

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sincronización por Vencimiento: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Sin cambios en los accesos (todo sigue igual)."
          fi
