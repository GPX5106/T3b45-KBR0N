name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  URL_EXCEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSl7QoufNmMoMeG-SyeB5KaqDupbAYtg_675LcwbYSQGT2JKUdXo2F_aqFRkDzBurNUH39DFSRfeG7b/pub?gid=2124629301&single=true&output=csv"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Procesar Listas
        run: |
          # 1. Descargar la lista maestra original
          curl -L "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          
          # 2. Crear la versión base para el servidor (tu IP de Tailscale)
          sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u | tr -d '\r' > lista_servidor.m3u

          # 3. Descargar base de datos de usuarios desde Google Sheets
          curl -L "$URL_EXCEL" -o usuarios.csv

          # 4. LIMPIEZA: Borramos todos los archivos de usuarios anteriores
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" ! -name "lista_servidor.m3u" -delete

          # 5. GENERACIÓN POR FECHA DE VENCIMIENTO
          AHORA=$(date +%s)

          # Leemos 3 columnas: A (basura/tiempo), B (nombre), C (vencimiento)
          tail -n +2 usuarios.csv | while IFS=',' read -r basura nombre vencimiento || [ -n "$nombre" ]; do
            
            # Limpiamos los datos
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            # Saltar si el nombre está vacío
            [ -z "$USER" ] && continue

            # Convertimos DD/MM/AAAA a AAAA-MM-DD
            FECHA_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            
            # Convertimos a segundos y damos margen hasta el final del día
            FECHA_LIMITE_SEC=$(date -d "$FECHA_ISO" +%s 2>/dev/null || echo 0)
            FECHA_LIMITE_FIN_DIA=$((FECHA_LIMITE_SEC + 86399))

            if [ "$FECHA_LIMITE_FIN_DIA" -ge "$AHORA" ]; then
              FILE_NAME="${USER}.m3u"
              echo "✅ $USER activo hasta el $FECHA_FIN"
              
              # Si el archivo NO existe antes de crearlo, es que es un alta nueva
              if [ ! -f "$FILE_NAME" ]; then
                ES_NUEVO=true
              else
                ES_NUEVO=false
              fi

              echo "# Lista para $USER - EXPIRA: $FECHA_FIN - Actualizada: $(date +'%d/%m/%Y %H:%M')" > "$FILE_NAME"
              cat lista_servidor.m3u >> "$FILE_NAME"

              # Si es un alta nueva, enviamos el mensaje a Telegram
              if [ "$ES_NUEVO" = true ]; then
                RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/${FILE_NAME}"
                MESSAGE="🚀 *¡Nueva lista generada!*%0A%0A👤 *Usuario:* ${USER}%0A📅 *Vence:* ${FECHA_FIN}%0A%0A🔗 *Enlace Raw:*%0A\`${RAW_URL}\`"
                
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                  -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                  -d "text=${MESSAGE}" \
                  -d "parse_mode=Markdown"
              fi
            else
              echo "⚠️ $USER ha caducado el $FECHA_FIN. Omitiendo."
            fi
          done

          # Limpieza de archivos temporales
          rm lista_servidor.m3u usuarios.csv

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sincronización Forms y Notificación: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Sin cambios en los accesos."
          fi
