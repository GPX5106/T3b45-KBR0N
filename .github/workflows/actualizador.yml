name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Procesar Listas
        run: |
          # 1. Descargar la lista
          curl -L "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          
          # 2. Crear la versión de servidor limpiando caracteres extraños
          # Usamos 'tr' para asegurar que los saltos de línea sean correctos
          sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u | tr -d '\r' > lista_servidor.m3u

          # 3. ASIGNACIÓN PERSONALIZADA
          # Aquí tú eliges qué versión le das a cada archivo:

          # Amigos que usan SU PROPIO motor (Lista Normal):
          

          # Amigos que usan TU PC (Lista Servidor):
          [ -f manuel.m3u ] && cp lista_servidor.m3u manuel.m3u
          
          # Nota: 'maestra.m3u' se queda como la normal por defecto.

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Actualización personalizada de listas" && git push)
