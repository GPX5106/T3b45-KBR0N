Name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  URL_EXCEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSl7QoufNmMoMeG-SyeB5KaqDupbAYtg_675LcwbYSQGT2JKUdXo2F_aqFRkDzBurNUH39DFSRfeG7b/pub?gid=2124629301&single=true&output=csv"
  URL_NEWERA: "https://ipfs.io/ipns/k2k4r8lm8tkmuxbc8lkmq1in3v0oya1p6pe9o5bu0hu30br5ko08k2gb/data/listas/lista_iptv.m3u"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Procesar Listas
        run: |
          # 1. Descargar las listas maestras y el CSV
          # Usamos gateways alternativos por si falla el principal de ipfs.io
          curl -L --retry 3 "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u || curl -L "https://cloudflare-ipfs.com/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          curl -L --retry 3 "$URL_NEWERA" -o newera_base.m3u
          curl -L --retry 3 "$URL_EXCEL" -o usuarios.csv

          mkdir -p temp_listas

          # 2. GENERACIÓN POR FECHA DE VENCIMIENTO
          AHORA=$(date +%s)

          tail -n +2 usuarios.csv | while IFS=',' read -r basura nombre vencimiento || [ -n "$nombre" ]; do
            
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            [ -z "$USER" ] && continue

            FECHA_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            FECHA_LIMITE_SEC=$(date -d "$FECHA_ISO" +%s 2>/dev/null || echo 0)
            FECHA_LIMITE_FIN_DIA=$((FECHA_LIMITE_SEC + 86399))

            if [ "$FECHA_LIMITE_FIN_DIA" -ge "$AHORA" ]; then
              FILE_LOCAL="${USER}(local).m3u"
              FILE_SERVI="${USER}(servidor).m3u"
              FILE_NEWER="${USER}(newera).m3u"
              
              if [ ! -f "$FILE_LOCAL" ]; then
                ES_NUEVO=true
              else
                ES_NUEVO=false
              fi

              # Crear archivo LOCAL
              echo "# LISTA LOCAL PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_LOCAL"
              cat maestra.m3u >> "temp_listas/$FILE_LOCAL"

              # Crear archivo SERVIDOR
              echo "# LISTA SERVIDOR PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_SERVI"
              sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u >> "temp_listas/$FILE_SERVI"

              # Crear archivo NEW ERA
              echo "# LISTA NEW ERA PARA $USER - EXPIRA: $FECHA_FIN" > "temp_listas/$FILE_NEWER"
              cat newera_base.m3u >> "temp_listas/$FILE_NEWER"

              # 3. NOTIFICACIÓN TELEGRAM
              if [ "$ES_NUEVO" = true ]; then
                echo "🚀 Notificando nueva alta: $USER"
                
                # Helper para codificar URLs (paréntesis)
                encode() { echo "$1" | sed 's/(/%28/g; s/)/%29/g'; }
                
                URL_L="https://raw.githubusercontent.com/${{ github.repository }}/main/$(encode "$FILE_LOCAL")"
                URL_S="https://raw.githubusercontent.com/${{ github.repository }}/main/$(encode "$FILE_SERVI")"
                URL_N="https://raw.githubusercontent.com/${{ github.repository }}/main/$(encode "$FILE_NEWER")"
                
                MESSAGE="🚀 <b>¡Nueva alta: ${USER}!</b>%0A%0A📅 <b>Vence:</b> ${FECHA_FIN}%0A%0A🏠 <b>LOCAL:</b>%0A<code>${URL_L}</code>%0A%0A☁️ <b>SERVIDOR:</b>%0A<code>${URL_S}</code>%0A%0A✨ <b>NEW ERA:</b>%0A<code>${URL_N}</code>"
                
                curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                  -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
                  -d "text=${MESSAGE}" \
                  -d "parse_mode=HTML"
              fi
            fi
          done

          # 4. LIMPIEZA Y SUSTITUCIÓN:
          # Borramos m3u antiguos (excepto las bases) y movemos los nuevos
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" ! -name "newera_base.m3u" -delete
          mv temp_listas/*.m3u . 2>/dev/null || true
          
          rm -rf temp_listas usuarios.csv newera_base.m3u

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sincronización Pro (Local/Servidor/NewEra): $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Sin cambios en los usuarios."
          fi



