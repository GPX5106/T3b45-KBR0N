name: Actualizar Listas Diariamente

on:
  schedule:
    - cron: '0 * * * *' # Se ejecuta cada hora
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  URL_EXCEL: "https://docs.google.com/spreadsheets/d/e/2PACX-1vSl7QoufNmMoMeG-SyeB5KaqDupbAYtg_675LcwbYSQGT2JKUdXo2F_aqFRkDzBurNUH39DFSRfeG7b/pub?gid=0&single=true&output=csv"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Procesar Listas
        run: |
          # 1. Descargar la lista maestra original
          curl -L "https://ipfs.io/ipns/k51qzi5uqu5di462t7j4vu4akwfhvtjhy88qbupktvoacqfqe9uforjvhyi4wr/hashes.m3u" -o maestra.m3u
          
          # 2. Crear la versión base para el servidor (tu IP de Tailscale)
          sed 's|127.0.0.1|100.98.88.79|g' maestra.m3u | tr -d '\r' > lista_servidor.m3u

          # 3. Descargar base de datos de usuarios desde Google Sheets
          curl -L "$URL_EXCEL" -o usuarios.csv

          # 4. LIMPIEZA: Borramos todos los .m3u de usuarios antiguos
          find . -maxdepth 1 -name "*.m3u" ! -name "maestra.m3u" ! -name "lista_servidor.m3u" -delete

          # 5. GENERACIÓN CON CONTROL DE FECHA
          # Obtenemos la fecha de hoy en formato segundos (Epoch) para comparar
          AHORA=$(date +%s)

          # Leemos Nombre (col A), Pago (col B), Vencimiento (col C)
          tail -n +2 usuarios.csv | while IFS=',' read -r nombre pago vencimiento || [ -n "$nombre" ]; do
            
            USER=$(echo "$nombre" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            STATUS=$(echo "$pago" | xargs | tr '[:upper:]' '[:lower:]' | tr -d '\r')
            FECHA_FIN=$(echo "$vencimiento" | xargs | tr -d '\r')

            [ -z "$USER" ] && continue

            # Convertimos la fecha del Excel (DD/MM/AAAA) a segundos para comparar
            # Usamos un truco de cambiar / por - para que 'date' lo entienda bien
            FECHA_LIMITE_ISO=$(echo "$FECHA_FIN" | awk -F'/' '{print $3"-"$2"-"$1}')
            FECHA_LIMITE_SEC=$(date -d "$FECHA_LIMITE_ISO" +%s 2>/dev/null || echo 0)

            if { [ "$STATUS" = "sí" ] || [ "$STATUS" = "si" ]; } && [ "$FECHA_LIMITE_SEC" -ge "$AHORA" ]; then
              echo "✅ $USER está activo. Vence el $FECHA_FIN"
              echo "# Lista para $USER - Vence: $FECHA_FIN - Act: $(date +'%d/%m/%Y %H:%M')" > "${USER}.m3u"
              cat lista_servidor.m3u >> "${USER}.m3u"
            else
              if [ "$FECHA_LIMITE_SEC" -lt "$AHORA" ]; then
                echo "⚠️ $USER ha caducado ($FECHA_FIN). Se procede a baja."
              else
                echo "❌ $USER desactivado por falta de pago."
              fi
            fi
          done

          rm lista_servidor.m3u usuarios.csv

      - name: Guardar cambios automáticamente
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          if ! git diff --cached --quiet; then
            git commit -m "Sincronización Inteligente: $(date +'%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "Sin cambios detectados."
          fi
